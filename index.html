<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectroRescue </title>
    <link rel="icon" type="image/svg" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-app: #020617;
        --bg-panel: #0f172a;
        --bg-card: #1e293b;
        --border: #334155;
        --text-muted: #64748b;
        --text-sec: #94a3b8;
        --text-prim: #cbd5e1;
        --text-high: #f8fafc;
        --accent: #3b82f6;
      }

      body.theme-white {
        --bg-app: #f1f5f9;
        --bg-panel: #ffffff;
        --bg-card: #e2e8f0;
        --border: #cbd5e1;
        --text-muted: #94a3b8;
        --text-sec: #475569;
        --text-prim: #1e293b;
        --text-high: #0f172a;
      }

      body.theme-green {
        --bg-app: #022c22;
        --bg-panel: #064e3b;
        --bg-card: #065f46;
        --border: #047857;
        --text-muted: #34d399;
        --text-sec: #6ee7b7;
        --text-prim: #a7f3d0;
        --text-high: #ecfdf5;
        --accent: #10b981;
      }

      body.theme-cherry {
        --bg-app: #4c0519;
        --bg-panel: #881337;
        --bg-card: #9f1239;
        --border: #be123c;
        --text-muted: #fb7185;
        --text-sec: #fda4af;
        --text-prim: #ffe4e6;
        --text-high: #fff1f2;
        --accent: #f43f5e;
      }

      body.theme-midnight {
        --bg-app: #000000;
        --bg-panel: #0a0a0a;
        --bg-card: #171717;
        --border: #262626;
        --text-muted: #525252;
        --text-sec: #a3a3a3;
        --text-prim: #d4d4d4;
        --text-high: #ffffff;
        --accent: #6366f1;
      }

      html {
        font-size: 16px;
      }

      body {
        background-color: var(--bg-app);
        color: var(--text-high);
        transition: background-color 0.3s ease, color 0.3s ease;
        font-family: "Poppins", sans-serif;
        font-size: 1rem;
        line-height: 1.5;
      }

      @keyframes laser-scan {
        0% {
          top: -5%;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        50% {
          opacity: 1;
          box-shadow: 0 0 15px 2px var(--accent);
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 105%;
          opacity: 0;
        }
      }

      .animate-laser-scan {
        animation: laser-scan 2s linear infinite;
        background: linear-gradient(
          to bottom,
          transparent,
          var(--accent) 50%,
          transparent
        );
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              slate: {
                950: "var(--bg-app)",
                900: "var(--bg-panel)",
                800: "var(--bg-card)",
                700: "var(--border)",
                600: "var(--text-muted)",
                500: "var(--text-muted)",
                400: "var(--text-sec)",
                300: "var(--text-prim)",
                200: "var(--text-high)",
              },
              white: "var(--text-high)",
            },
          },
        },
      };
    </script>

    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.1/",
          "react": "https://aistudiocdn.com/react@^19.2.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
          "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
          "firebase/app": "https://esm.sh/firebase@^12.6.0/app",
          "firebase/auth": "https://esm.sh/firebase@^12.6.0/auth",
          "firebase/analytics": "https://esm.sh/firebase@^12.6.0/analytics",
          "firebase/firestore": "https://esm.sh/firebase@^12.6.0/firestore",
          "firebase/storage": "https://esm.sh/firebase@^12.6.0/storage",
          "firebase/": "https://esm.sh/firebase@^12.6.0/"
        }
      }
    </script>

    <link rel="stylesheet" href="/index.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
